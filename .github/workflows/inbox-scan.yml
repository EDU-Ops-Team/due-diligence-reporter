name: Inbox Scan

on:
  schedule:
    - cron: '0 11-23 * * 1-5'     # Every 60 min, 6AM-6PM Central (UTC 11-23), Mon-Fri
    - cron: '0 0-2 * * 1-5'       # Every 60 min, 6PM-8PM Central (UTC 0-2 next day), Mon-Fri
  workflow_dispatch:
    inputs:
      scan_only:
        description: 'Run inbox scan only (skip readiness check & report pipeline)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: inbox-scan
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Vendor gate ON: requires vendor-sourced SIR + BI + raycon_scenario.json. Greg's call (Rec. 8). Manual MCP path is unaffected.
  VENDOR_GATE_ENABLED: "1"

jobs:
  inbox-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore DD republish dedup state
        # Persists .dd_republish_state.json across cron ticks so source
        # fingerprints republish once. Save key is run-id-scoped so each
        # run writes a fresh entry; restore-keys falls back to the latest
        # entry that matches the prefix. The cache is shared across
        # workflows on purpose so inbox-scan and raycon-followup see each
        # other's dedup state.
        id: restore-dd-republish-state
        uses: actions/cache/restore@v4
        with:
          path: .dd_republish_state.json
          key: dd-republish-state-${{ github.run_id }}
          restore-keys: |
            dd-republish-state-

      - name: Restore Rhodes registration retry state
        # Failed Rhodes document-link attempts are retried on later inbox
        # scans without blocking the original Drive filing.
        id: restore-rhodes-registration-retry-state
        uses: actions/cache/restore@v4
        with:
          path: .rhodes_registration_retry_state.json
          key: rhodes-registration-retry-state-${{ github.run_id }}
          restore-keys: |
            rhodes-registration-retry-state-

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.OAUTH_CLIENT_ID }}" ]            || { echo "OAUTH_CLIENT_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]        || { echo "OAUTH_CLIENT_SECRET missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_REFRESH_TOKEN }}" ]        || { echo "OAUTH_REFRESH_TOKEN missing"; exit 1; }
          [ -n "${{ secrets.SIR_FOLDER_ID }}" ]              || { echo "SIR_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.ISP_FOLDER_ID }}" ]              || { echo "ISP_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}" ] || { echo "BUILDING_INSPECTION_FOLDER_ID missing"; exit 1; }
          # RAYCON_WEBHOOK_SECRET is optional: RayCon's /v1/jobs is public
          # under the current /v1/* rollout. When set, we sign the body
          # with HMAC-SHA256 so we're ready the day RayCon flips on
          # signature verification.
          echo "All required secrets are present"

      - name: Create .env file from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DD_TEMPLATE_V3_GOOGLE_DOC_ID: ${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          DD_REPORT_EMAIL_RECIPIENTS: ${{ secrets.DD_REPORT_EMAIL_RECIPIENTS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SIR_NOTIFICATION_RECIPIENTS: ${{ secrets.SIR_NOTIFICATION_RECIPIENTS }}
          CDS_NOTIFICATION_RECIPIENTS: ${{ secrets.CDS_NOTIFICATION_RECIPIENTS }}
          GLOBAL_EMAIL_CC: ${{ secrets.GLOBAL_EMAIL_CC }}
          RHODES_API_KEY: ${{ secrets.RHODES_API_KEY }}
          RHODES_MCP_URL: ${{ secrets.RHODES_MCP_URL }}
          RHODES_RETRY_STATE_STORE: ${{ vars.RHODES_RETRY_STATE_STORE }}
          RHODES_RETRY_STATE_FIRESTORE_PROJECT_ID: ${{ vars.RHODES_RETRY_STATE_FIRESTORE_PROJECT_ID }}
          RHODES_RETRY_STATE_FIRESTORE_DATABASE: ${{ vars.RHODES_RETRY_STATE_FIRESTORE_DATABASE }}
          RHODES_RETRY_STATE_FIRESTORE_COLLECTION: ${{ vars.RHODES_RETRY_STATE_FIRESTORE_COLLECTION }}
          DD_REPUBLISH_STATE_STORE: ${{ vars.DD_REPUBLISH_STATE_STORE }}
          DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID: ${{ vars.DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID }}
          DD_REPUBLISH_STATE_FIRESTORE_DATABASE: ${{ vars.DD_REPUBLISH_STATE_FIRESTORE_DATABASE }}
          DD_REPUBLISH_STATE_FIRESTORE_COLLECTION: ${{ vars.DD_REPUBLISH_STATE_FIRESTORE_COLLECTION }}

          SIR_FOLDER_ID: ${{ secrets.SIR_FOLDER_ID }}
          ISP_FOLDER_ID: ${{ secrets.ISP_FOLDER_ID }}
          BUILDING_INSPECTION_FOLDER_ID: ${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}
          # SHOVELS_API_KEY intentionally omitted — Shovels integration
          # runs upstream (AI SIR / source-evidence build); DDR no
          # longer initiates live Shovels API calls.
          INBOX_SCANNER_TOKEN: ${{ secrets.INBOX_SCANNER_TOKEN }}
          RAYCON_WEBHOOK_SECRET: ${{ secrets.RAYCON_WEBHOOK_SECRET }}
          RAYCON_API_KEY: ${{ secrets.RAYCON_API_KEY }}
        run: |
          touch .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env
          echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID=${DD_TEMPLATE_V3_GOOGLE_DOC_ID}" >> .env
          echo "GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}" >> .env
          echo "GOOGLE_CHAT_WEBHOOK_URL=${GOOGLE_CHAT_WEBHOOK_URL}" >> .env
          echo "DD_REPORT_EMAIL_RECIPIENTS=${DD_REPORT_EMAIL_RECIPIENTS}" >> .env
          echo "EMAIL_SENDER=${EMAIL_SENDER}" >> .env
          echo "EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}" >> .env
          echo "SIR_NOTIFICATION_RECIPIENTS=${SIR_NOTIFICATION_RECIPIENTS}" >> .env
          echo "CDS_NOTIFICATION_RECIPIENTS=${CDS_NOTIFICATION_RECIPIENTS}" >> .env
          echo "GLOBAL_EMAIL_CC=${GLOBAL_EMAIL_CC}" >> .env
          echo "RHODES_API_KEY=${RHODES_API_KEY}" >> .env
          echo "RHODES_MCP_URL=${RHODES_MCP_URL}" >> .env
          echo "RHODES_RETRY_STATE_STORE=${RHODES_RETRY_STATE_STORE}" >> .env
          echo "RHODES_RETRY_STATE_FIRESTORE_PROJECT_ID=${RHODES_RETRY_STATE_FIRESTORE_PROJECT_ID}" >> .env
          echo "RHODES_RETRY_STATE_FIRESTORE_DATABASE=${RHODES_RETRY_STATE_FIRESTORE_DATABASE}" >> .env
          echo "RHODES_RETRY_STATE_FIRESTORE_COLLECTION=${RHODES_RETRY_STATE_FIRESTORE_COLLECTION}" >> .env
          echo "DD_REPUBLISH_STATE_STORE=${DD_REPUBLISH_STATE_STORE}" >> .env
          echo "DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID=${DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID}" >> .env
          echo "DD_REPUBLISH_STATE_FIRESTORE_DATABASE=${DD_REPUBLISH_STATE_FIRESTORE_DATABASE}" >> .env
          echo "DD_REPUBLISH_STATE_FIRESTORE_COLLECTION=${DD_REPUBLISH_STATE_FIRESTORE_COLLECTION}" >> .env

          echo "SIR_FOLDER_ID=${SIR_FOLDER_ID}" >> .env
          echo "ISP_FOLDER_ID=${ISP_FOLDER_ID}" >> .env
          echo "BUILDING_INSPECTION_FOLDER_ID=${BUILDING_INSPECTION_FOLDER_ID}" >> .env
          echo "INBOX_SCANNER_TOKEN=${INBOX_SCANNER_TOKEN}" >> .env
          echo "RAYCON_WEBHOOK_SECRET=${RAYCON_WEBHOOK_SECRET}" >> .env
          echo "RAYCON_API_KEY=${RAYCON_API_KEY}" >> .env
          echo "Created .env file"

      - name: Write Google OAuth client secrets
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          mkdir -p credentials
          python -c "
          import json, os
          data = {
              'installed': {
                  'client_id': os.environ['OAUTH_CLIENT_ID'],
                  'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
                  'redirect_uris': ['http://localhost'],
                  'auth_uri': 'https://accounts.google.com/o/oauth2/auth',
                  'token_uri': 'https://oauth2.googleapis.com/token',
              }
          }
          with open('credentials/client_secrets.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "Wrote credentials/client_secrets.json"

      - name: Write Google OAuth refresh token
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          python -c "
          import json, os
          data = {
              'token': None,
              'refresh_token': os.environ['OAUTH_REFRESH_TOKEN'],
              'token_uri': 'https://oauth2.googleapis.com/token',
              'client_id': os.environ['OAUTH_CLIENT_ID'],
              'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
              'scopes': [
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/documents',
                  'https://www.googleapis.com/auth/gmail.modify',
              ],
          }
          with open('.gcp-saved-tokens.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "Wrote .gcp-saved-tokens.json"

      - name: Write Firestore service account credentials
        env:
          GCP_FIRESTORE_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_FIRESTORE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GCP_FIRESTORE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "No Firestore service account configured; Firestore-backed state will use JSON/cache fallback"
            exit 0
          fi
          mkdir -p credentials
          printf '%s' "${GCP_FIRESTORE_SERVICE_ACCOUNT_JSON}" > credentials/firestore-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${GITHUB_WORKSPACE}/credentials/firestore-service-account.json" >> "$GITHUB_ENV"
          echo "Firestore service account credentials configured"

      - name: Run inbox scan
        env:
          INPUT_SCAN_ONLY: ${{ inputs.scan_only }}
        run: |
          set -euo pipefail
          if [ "${INPUT_SCAN_ONLY:-}" = "true" ]; then
            uv run python scripts/scan_inbox.py --scan-only
          else
            uv run python scripts/scan_inbox.py
          fi

      - name: Save DD republish dedup state
        # Always run so state persists even when the script step exits
        # non-zero. Run-id-scoped save key avoids the in-place-update
        # restriction of actions/cache.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .dd_republish_state.json
          key: dd-republish-state-${{ github.run_id }}

      - name: Save Rhodes registration retry state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .rhodes_registration_retry_state.json
          key: rhodes-registration-retry-state-${{ github.run_id }}

      - name: Done
        run: echo "Inbox scan completed"

