name: Publish to MCP Hive

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish even if not a release"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MCP_SERVER_URL: https://mcp-hive.ti.trilogy.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.MCP_HIVE_API_KEY }}" ] || { echo "MCP_HIVE_API_KEY missing"; exit 1; }
          [ -n "${{ secrets.MCP_HIVE_ID }}" ] || { echo "MCP_HIVE_ID missing"; exit 1; }
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] || { echo "OPENAI_API_KEY missing"; exit 1; }
          [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ] || { echo "ANTHROPIC_API_KEY missing"; exit 1; }
          [ -n "${{ secrets.LOCATIONOS_MCP_API_KEY || secrets.RHODES_API_KEY }}" ] || { echo "LOCATIONOS_MCP_API_KEY or RHODES_API_KEY missing"; exit 1; }
          if [ -z "${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}" ] && [ -z "${{ secrets.DD_TEMPLATE_GOOGLE_DOC_ID }}" ]; then
            echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID or DD_TEMPLATE_GOOGLE_DOC_ID must be set"
            exit 1
          fi
          [ -n "${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}" ] || { echo "GOOGLE_DRIVE_ROOT_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_ID }}" ] || { echo "OAUTH_CLIENT_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ] || { echo "OAUTH_CLIENT_SECRET missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_REFRESH_TOKEN }}" ] || { echo "OAUTH_REFRESH_TOKEN missing"; exit 1; }

          [ -n "${{ secrets.SIR_FOLDER_ID }}" ] || { echo "SIR_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.ISP_FOLDER_ID }}" ] || { echo "ISP_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}" ] || { echo "BUILDING_INSPECTION_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.EMAIL_SENDER }}" ] || { echo "EMAIL_SENDER missing"; exit 1; }
          [ -n "${{ secrets.EMAIL_APP_PASSWORD }}" ] || { echo "EMAIL_APP_PASSWORD missing"; exit 1; }
          [ -n "${{ secrets.DD_REPORT_EMAIL_RECIPIENTS }}" ] || { echo "DD_REPORT_EMAIL_RECIPIENTS missing"; exit 1; }
          # RAYCON_WEBHOOK_SECRET is optional: RayCon's /v1/jobs is public
          # under the current /v1/* rollout. When set, we sign the body
          # with HMAC-SHA256 so we're ready the day RayCon flips on
          # signature verification.
          echo "All required secrets are present"

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          python -c "import tomllib,sys;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])" | tee version.txt
          echo "version=$(cat version.txt)" >> "$GITHUB_OUTPUT"
          echo "Found version: $(cat version.txt)"

      - name: Create .env file from GitHub secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CAPACITY_MODEL: ${{ vars.OPENAI_CAPACITY_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DD_TEMPLATE_GOOGLE_DOC_ID: ${{ secrets.DD_TEMPLATE_GOOGLE_DOC_ID }}
          DD_TEMPLATE_V3_GOOGLE_DOC_ID: ${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          SIR_FOLDER_ID: ${{ secrets.SIR_FOLDER_ID }}
          ISP_FOLDER_ID: ${{ secrets.ISP_FOLDER_ID }}
          BUILDING_INSPECTION_FOLDER_ID: ${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          DD_REPORT_EMAIL_RECIPIENTS: ${{ secrets.DD_REPORT_EMAIL_RECIPIENTS }}
          GLOBAL_EMAIL_CC: ${{ secrets.GLOBAL_EMAIL_CC }}
          DDR_GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.DDR_GOOGLE_CHAT_WEBHOOK_URL }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          LOCATIONOS_MCP_API_KEY: ${{ secrets.LOCATIONOS_MCP_API_KEY }}
          RHODES_API_KEY: ${{ secrets.RHODES_API_KEY }}
          RHODES_MCP_URL: ${{ secrets.RHODES_MCP_URL }}
          RAYCON_WEBHOOK_SECRET: ${{ secrets.RAYCON_WEBHOOK_SECRET }}
          RAYCON_API_KEY: ${{ secrets.RAYCON_API_KEY }}
        run: |
          TEMPLATE_DOC_ID="${DD_TEMPLATE_V3_GOOGLE_DOC_ID:-$DD_TEMPLATE_GOOGLE_DOC_ID}"
          if [ -z "${DD_TEMPLATE_V3_GOOGLE_DOC_ID}" ]; then
            echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID not set; falling back to DD_TEMPLATE_GOOGLE_DOC_ID"
          fi
          touch .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "OPENAI_CAPACITY_MODEL=${OPENAI_CAPACITY_MODEL}" >> .env
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env
          echo "DD_TEMPLATE_GOOGLE_DOC_ID=${DD_TEMPLATE_GOOGLE_DOC_ID}" >> .env
          echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID=${TEMPLATE_DOC_ID}" >> .env
          echo "GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}" >> .env
          echo "SIR_FOLDER_ID=${SIR_FOLDER_ID}" >> .env
          echo "ISP_FOLDER_ID=${ISP_FOLDER_ID}" >> .env
          echo "BUILDING_INSPECTION_FOLDER_ID=${BUILDING_INSPECTION_FOLDER_ID}" >> .env
          echo "EMAIL_SENDER=${EMAIL_SENDER}" >> .env
          echo "EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}" >> .env
          echo "DD_REPORT_EMAIL_RECIPIENTS=${DD_REPORT_EMAIL_RECIPIENTS}" >> .env
          echo "GLOBAL_EMAIL_CC=${GLOBAL_EMAIL_CC}" >> .env
          echo "DDR_GOOGLE_CHAT_WEBHOOK_URL=${DDR_GOOGLE_CHAT_WEBHOOK_URL}" >> .env
          echo "OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}" >> .env
          echo "OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}" >> .env
          echo "OAUTH_REFRESH_TOKEN=${OAUTH_REFRESH_TOKEN}" >> .env
          LOCATIONOS_TOKEN="${LOCATIONOS_MCP_API_KEY:-${RHODES_API_KEY:-}}"
          echo "LOCATIONOS_MCP_API_KEY=${LOCATIONOS_TOKEN}" >> .env
          echo "RHODES_API_KEY=${RHODES_API_KEY:-${LOCATIONOS_TOKEN}}" >> .env
          echo "RHODES_MCP_URL=${RHODES_MCP_URL}" >> .env
          echo "RAYCON_WEBHOOK_SECRET=${RAYCON_WEBHOOK_SECRET}" >> .env
          echo "RAYCON_API_KEY=${RAYCON_API_KEY}" >> .env
          echo "Created .env file with secrets"

      - name: Create custom payload file
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          cat > custom_payload.json << JSON
          {
            "hiveName": "Alpha DD Report Generator",
            "hiveDescription": "Model Context Protocol server for generating Alpha School Due Diligence reports. Reads supplied site context and Google Drive evidence, applies E-Occupancy and School Approval scoring, and creates a completed DD report Google Doc.",
            "version": "${{ steps.get_version.outputs.version }}",
            "tags": ["alpha-due-diligence", "google-docs"],
            "homePage": "${REPO_URL}",
            "env": [
              "OPENAI_API_KEY",
              "OPENAI_CAPACITY_MODEL",
              "ANTHROPIC_API_KEY",
              "DD_TEMPLATE_V3_GOOGLE_DOC_ID",
              "GOOGLE_DRIVE_ROOT_FOLDER_ID",
              "SIR_FOLDER_ID",
              "ISP_FOLDER_ID",
              "BUILDING_INSPECTION_FOLDER_ID",
              "EMAIL_SENDER",
              "EMAIL_APP_PASSWORD",
              "DD_REPORT_EMAIL_RECIPIENTS",
              "GLOBAL_EMAIL_CC",
              "DDR_GOOGLE_CHAT_WEBHOOK_URL",
              "OAUTH_CLIENT_ID",
              "OAUTH_CLIENT_SECRET",
              "OAUTH_REFRESH_TOKEN",
              "LOCATIONOS_MCP_API_KEY",
              "RHODES_API_KEY",
              "RHODES_MCP_URL",
              "RAYCON_WEBHOOK_SECRET",
              "RAYCON_API_KEY"
            ],
            "securitySchemes": [
              {
                "id": "oauth2",
                "type": "oauth2",
                "flows": {
                  "authorizationCode": {
                    "authorizationUrl": "https://accounts.google.com/o/oauth2/v2/auth",
                    "tokenUrl": "https://oauth2.googleapis.com/token",
                    "scopes": {
                      "https://www.googleapis.com/auth/drive": "Read and write files in Google Drive",
                      "https://www.googleapis.com/auth/documents": "Create and edit Google Docs",
                      "https://www.googleapis.com/auth/gmail.modify": "Read and send email via Gmail"
                    }
                  }
                }
              }
            ],
            "oAuthClient": {
              "clientId": "${{ secrets.OAUTH_CLIENT_ID }}",
              "clientSecret": "${{ secrets.OAUTH_CLIENT_SECRET }}"
            }
          }
          JSON
          echo "Custom payload:"
          cat custom_payload.json

      - name: Verify uv.lock is present
        run: |
          # uv.lock MUST ship in the publish zip so MCP Hive cold-starts run
          # `uv sync --frozen --no-dev` instead of doing a full dependency
          # resolver pass on the request path. Missing-lockfile cold starts
          # have caused both 502 Bad Gateway and 60s `tools/list` timeouts
          # on mcp-server.ti.trilogy.com.
          if [ ! -f uv.lock ]; then
            echo "ERROR: uv.lock is missing. Refusing to publish without a frozen lockfile."
            echo "Run \`uv lock\` locally and commit the result."
            exit 1
          fi
          echo "uv.lock present ($(wc -l < uv.lock) lines)"

      - name: Create ZIP for MCP Hive
        run: |
          ZIP_PATH="../due-diligence-reporter-mcp.zip"
          zip -r "$ZIP_PATH" . \
            -x "*.git*" \
            "*/__pycache__/*" \
            "*.DS_Store" \
            "build/*" \
            "*.egg-info/*" \
            ".venv/*" \
            ".ruff_cache/*" \
            ".env" \
            ".gcp-saved-tokens.json" \
            "credentials/*" \
            ".dd_republish_state.json" \
            ".rhodes_registration_retry_state.json" \
            ".raycon_dispatch_state.json" \
            ".raycon_followup_alerts.json"
          echo "Created zip: $ZIP_PATH"
          ls -la "$ZIP_PATH"
          # Sanity check: confirm uv.lock made it into the zip.
          unzip -l "$ZIP_PATH" | grep -q ' uv.lock$' || {
            echo "ERROR: uv.lock missing from publish zip"
            exit 1
          }
          echo "Confirmed uv.lock is inside publish zip"
          if unzip -l "$ZIP_PATH" | grep -q ' .env$'; then
            echo "ERROR: .env must not be packaged in the MCP Hive zip"
            exit 1
          fi
          if unzip -l "$ZIP_PATH" | grep -q ' .gcp-saved-tokens.json$'; then
            echo "ERROR: .gcp-saved-tokens.json must not be packaged in the MCP Hive zip"
            exit 1
          fi
          if unzip -l "$ZIP_PATH" | grep -q ' credentials/'; then
            echo "ERROR: credentials/ must not be packaged in the MCP Hive zip"
            exit 1
          fi

      - name: Publish to MCP Hive
        env:
          API_KEY: ${{ secrets.MCP_HIVE_API_KEY }}
          HIVE_ID: ${{ secrets.MCP_HIVE_ID }}
        run: |
          ZIP_PATH="../due-diligence-reporter-mcp.zip"
          CONFIG_JSON=$(jq -c '.' custom_payload.json)
          curl -sS -X PUT "$MCP_SERVER_URL/api/hives/$HIVE_ID/from-mcp-server" \
            -H "x-api-key: $API_KEY" \
            -F "zipFile=@${ZIP_PATH};type=application/zip" \
            --form-string "data=${CONFIG_JSON}"
          echo "Publish request sent"

      - name: Cancel stale mutating workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          workflows=(
            "Inbox Scan"
            "Vendor Doc Republish Sweep"
            "Daily DD Check"
            "RayCon Follow-up"
            "Drive Rhodes Reconciliation"
            "Ad-Hoc DDR Run"
          )
          for workflow in "${workflows[@]}"; do
            gh run list \
              --workflow "$workflow" \
              --status in_progress \
              --limit 20 \
              --json databaseId,headSha,url \
              --jq ".[] | select(.headSha != \"${CURRENT_SHA}\") | [.databaseId, .headSha, .url] | @tsv" |
            while IFS=$'\t' read -r run_id head_sha run_url; do
              if [ -z "${run_id:-}" ]; then
                continue
              fi
              echo "Canceling stale ${workflow} run ${run_id} (${head_sha}): ${run_url}"
              gh run cancel "$run_id" || true
            done
          done

      - name: Done
        run: |
          echo "Successfully initiated publish to MCP Hive"

