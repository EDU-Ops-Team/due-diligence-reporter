name: Daily DD Check

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9 AM Central (UTC-5), Monday-Friday
  workflow_dispatch:
    inputs:
      site:
        description: 'Filter to a single site (substring match on title). Leave blank for all sites.'
        required: false
        default: ''
        type: string

concurrency:
  group: dd-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Vendor gate ON: requires vendor-sourced SIR + BI + raycon_scenario.json. Greg's call (Rec. 8). Manual MCP path is unaffected.
  VENDOR_GATE_ENABLED: "1"

jobs:
  daily-check:
    runs-on: ubuntu-latest

    timeout-minutes: 60  # scheduled full-roster DD scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.WRIKE_ACCESS_TOKEN }}" ]         || { echo "[ERROR] WRIKE_ACCESS_TOKEN missing"; exit 1; }
          [ -n "${{ secrets.OPENAI_API_KEY }}" ]             || { echo "[ERROR] OPENAI_API_KEY missing"; exit 1; }
          [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]          || { echo "[ERROR] ANTHROPIC_API_KEY missing"; exit 1; }
          [ -n "${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}" ] || { echo "[ERROR] _GOOGLE_DOC_ID missing"; exit 1; }
          [ -n "${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}" ] || { echo "[ERROR] GOOGLE_DRIVE_ROOT_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_ID }}" ]            || { echo "[ERROR] OAUTH_CLIENT_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]        || { echo "[ERROR] OAUTH_CLIENT_SECRET missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_REFRESH_TOKEN }}" ]        || { echo "[ERROR] OAUTH_REFRESH_TOKEN missing"; exit 1; }
          [ -n "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" ]    || { echo "[ERROR] GOOGLE_CHAT_WEBHOOK_URL missing"; exit 1; }
          [ -n "${{ secrets.DD_REPORT_EMAIL_RECIPIENTS }}" ] || { echo "[ERROR] DD_REPORT_EMAIL_RECIPIENTS missing"; exit 1; }
          [ -n "${{ secrets.EMAIL_SENDER }}" ]               || { echo "[ERROR] EMAIL_SENDER missing"; exit 1; }
          [ -n "${{ secrets.EMAIL_APP_PASSWORD }}" ]         || { echo "[ERROR] EMAIL_APP_PASSWORD missing"; exit 1; }
          [ -n "${{ secrets.DASHBOARD_PUBLISH_SECRET }}" ]   || { echo "[ERROR] DASHBOARD_PUBLISH_SECRET missing"; exit 1; }
          echo "[OK] All required secrets are present"

      - name: Create .env file from secrets
        env:
          WRIKE_ACCESS_TOKEN: ${{ secrets.WRIKE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DD_TEMPLATE_V3_GOOGLE_DOC_ID: ${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          DD_REPORT_EMAIL_RECIPIENTS: ${{ secrets.DD_REPORT_EMAIL_RECIPIENTS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          GLOBAL_EMAIL_CC: ${{ secrets.GLOBAL_EMAIL_CC }}

          SIR_FOLDER_ID: ${{ secrets.SIR_FOLDER_ID }}
          ISP_FOLDER_ID: ${{ secrets.ISP_FOLDER_ID }}
          BUILDING_INSPECTION_FOLDER_ID: ${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}
          # SHOVELS_API_KEY intentionally omitted — Shovels integration
          # runs upstream (AI SIR / source-evidence build); DDR no
          # longer initiates live Shovels API calls.
          DASHBOARD_PUBLISH_SECRET: ${{ secrets.DASHBOARD_PUBLISH_SECRET }}
        run: |
          touch .env
          echo "WRIKE_ACCESS_TOKEN=${WRIKE_ACCESS_TOKEN}" >> .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env
          echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID=${DD_TEMPLATE_V3_GOOGLE_DOC_ID}" >> .env
          echo "GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}" >> .env
          echo "GOOGLE_CHAT_WEBHOOK_URL=${GOOGLE_CHAT_WEBHOOK_URL}" >> .env
          echo "DD_REPORT_EMAIL_RECIPIENTS=${DD_REPORT_EMAIL_RECIPIENTS}" >> .env
          echo "EMAIL_SENDER=${EMAIL_SENDER}" >> .env
          echo "EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}" >> .env
          echo "GLOBAL_EMAIL_CC=${GLOBAL_EMAIL_CC}" >> .env

          echo "SIR_FOLDER_ID=${SIR_FOLDER_ID}" >> .env
          echo "ISP_FOLDER_ID=${ISP_FOLDER_ID}" >> .env
          echo "BUILDING_INSPECTION_FOLDER_ID=${BUILDING_INSPECTION_FOLDER_ID}" >> .env
          # Dashboard publish: bearer for POST /api/sites/:slug/publish on dd-dashboard.
          # Without this the report pipeline silently skips the dashboard write
          # (see dashboard_publisher.publish_to_dashboard early-return).
          echo "DASHBOARD_PUBLISH_SECRET=${DASHBOARD_PUBLISH_SECRET}" >> .env
          echo "[OK] Created .env file"

      - name: Write Google OAuth client secrets
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          mkdir -p credentials
          python -c "
          import json, os
          data = {
              'installed': {
                  'client_id': os.environ['OAUTH_CLIENT_ID'],
                  'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
                  'redirect_uris': ['http://localhost'],
                  'auth_uri': 'https://accounts.google.com/o/oauth2/auth',
                  'token_uri': 'https://oauth2.googleapis.com/token',
              }
          }
          with open('credentials/client_secrets.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "[OK] Wrote credentials/client_secrets.json"

      - name: Write Google OAuth refresh token
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          python -c "
          import json, os
          data = {
              'token': None,
              'refresh_token': os.environ['OAUTH_REFRESH_TOKEN'],
              'token_uri': 'https://oauth2.googleapis.com/token',
              'client_id': os.environ['OAUTH_CLIENT_ID'],
              'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
              'scopes': [
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/documents',
                  'https://www.googleapis.com/auth/gmail.modify',
              ],
          }
          with open('.gcp-saved-tokens.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "[OK] Wrote .gcp-saved-tokens.json"

      - name: Run daily DD check
        run: |
          if [ -n "${{ inputs.site }}" ]; then
            uv run python scripts/daily_dd_check.py --site "${{ inputs.site }}"
          else
            uv run python scripts/daily_dd_check.py
          fi

      - name: Done
        run: echo "Daily DD check completed"

