name: Provision Site Drive Folder

# For sites whose Wrike Site Record has no Google Folder set, create a
# Drive folder under GOOGLE_DRIVE_ROOT_FOLDER_ID, pre-create the M1
# subfolder, and write the URL back to Wrike's Google Folder custom
# field. Brings sites that were previously flagged review_needed back
# into the automated SIR / BI / ISP / Block Plan routing path.
#
# Idempotent — sites that already have a Google Folder set are skipped.
#
# Reuses the same env / OAuth bootstrap as backfill-doc-readiness.yml.

on:
  workflow_dispatch:
    inputs:
      sites:
        description: 'Comma-separated list of site titles to provision (e.g. "Alpha School Frisco 13405, Alpha School Morrisville 200"). Substring match against active Wrike records.'
        required: true
        type: string
      dry_run:
        description: 'Resolve records and log planned actions, but do not create folders or write to Wrike.'
        required: false
        default: false
        type: boolean

concurrency:
  group: dd-pipeline
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  provision:
    runs-on: ubuntu-latest

    timeout-minutes: 15  # single-site Drive provisioning
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.WRIKE_ACCESS_TOKEN }}" ]         || { echo "[ERROR] WRIKE_ACCESS_TOKEN missing"; exit 1; }
          [ -n "${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}" ] || { echo "[ERROR] GOOGLE_DRIVE_ROOT_FOLDER_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_ID }}" ]            || { echo "[ERROR] OAUTH_CLIENT_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]        || { echo "[ERROR] OAUTH_CLIENT_SECRET missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_REFRESH_TOKEN }}" ]        || { echo "[ERROR] OAUTH_REFRESH_TOKEN missing"; exit 1; }
          echo "[OK] All required secrets are present"

      - name: Create .env file from secrets
        env:
          WRIKE_ACCESS_TOKEN: ${{ secrets.WRIKE_ACCESS_TOKEN }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
        run: |
          touch .env
          echo "WRIKE_ACCESS_TOKEN=${WRIKE_ACCESS_TOKEN}" >> .env
          echo "GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}" >> .env
          echo "[OK] Created .env file"

      - name: Write Google OAuth client secrets
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          mkdir -p credentials
          python -c "
          import json, os
          data = {
              'installed': {
                  'client_id': os.environ['OAUTH_CLIENT_ID'],
                  'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
                  'redirect_uris': ['http://localhost'],
                  'auth_uri': 'https://accounts.google.com/o/oauth2/auth',
                  'token_uri': 'https://oauth2.googleapis.com/token',
              }
          }
          with open('credentials/client_secrets.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "[OK] Wrote credentials/client_secrets.json"

      - name: Write Google OAuth refresh token
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          python -c "
          import json, os
          data = {
              'token': None,
              'refresh_token': os.environ['OAUTH_REFRESH_TOKEN'],
              'token_uri': 'https://oauth2.googleapis.com/token',
              'client_id': os.environ['OAUTH_CLIENT_ID'],
              'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
              'scopes': [
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/documents',
                  'https://www.googleapis.com/auth/gmail.modify',
              ],
          }
          with open('.gcp-saved-tokens.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
          echo "[OK] Wrote .gcp-saved-tokens.json"

      - name: Run provisioning
        run: |
          # Split the comma-separated input into argv positions, trimming
          # whitespace around each title.
          IFS=',' read -ra SITE_ARR <<< "${{ inputs.sites }}"
          ARGS=()
          for s in "${SITE_ARR[@]}"; do
            trimmed="$(echo "$s" | sed 's/^ *//;s/ *$//')"
            [ -n "$trimmed" ] && ARGS+=("$trimmed")
          done
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=("--dry-run")
          fi
          uv run python scripts/provision_site_drive_folder.py "${ARGS[@]}"

      - name: Done
        run: echo "Drive-folder provisioning completed"
