name: RayCon Follow-up

# Picks up `raycon_scenario.json` files RayCon writes back into per-site
# M1 folders (after DDR pings them via /v1/jobs) and publishes the
# RayCon Scenario Google Doc. Runs every 5 minutes during business
# hours so a Block Plan -> published scenario takes <10 min end-to-end.
#
# Re-running is safe: only re-publishes when the JSON is newer than
# the existing report Doc.
#
# ---------------------------------------------------------------------------
# RayCon callback receiver (Rec. 2 from event-driven-ddr-recommendations.md)
# ---------------------------------------------------------------------------
# When RayCon finishes a job it fires `workflow_dispatch` against this file
# with `site_id`, `run_id`, and `status` inputs. When `site_id` is provided
# the script scopes its work to that single site instead of sweeping every
# active site, which is the whole point of the callback.
#
# Auth model: PAT-only. GitHub's workflow_dispatch API strips custom
# request headers, so a body-level HMAC adds complexity without real
# security gain when the endpoint already requires a workflow-scoped
# token. RayCon authenticates with a fine-scoped PAT (workflow scope,
# this repo only). The outbound `RAYCON_WEBHOOK_SECRET` used for
# DDR -> RayCon signing is unrelated and stays in place.
#
# Cron remains as the deterministic safety net: any callback GitHub
# rejects, RayCon abandons, or this workflow fails to deliver gets
# picked up on the next 5-minute tick.

on:
  schedule:
    # Every 5 minutes, 6AM-6PM Central, Mon-Fri.
    - cron: '*/5 11-23 * * 1-5'
    # Every 5 minutes, 6PM-8PM Central (covers UTC rollover).
    - cron: '*/5 0-2 * * 2-6'
  workflow_dispatch:
    inputs:
      site:
        description: 'Optional site filter (substring match against title or address)'
        required: false
        type: string
      dry_run:
        description: 'Detect only; do not publish docs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      alert_after_minutes:
        description: 'Alert when a Block Plan has no scenario after this many minutes'
        required: false
        default: '60'
        type: string
      # New inputs for RayCon callback (Rec. 2). All optional so manual
      # triggers and the cron path keep working unchanged.
      site_id:
        description: 'Single site Drive folder id to scope the run to (RayCon callback).'
        required: false
        type: string
      run_id:
        description: 'RayCon run UUID (callback observability only)'
        required: false
        type: string
      status:
        description: 'RayCon job status (callback observability only)'
        required: false
        type: choice
        default: 'succeeded'
        options:
          - succeeded
          - failed
          - validation_failed
          - partial

concurrency:
  group: raycon-followup
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Vendor gate ON: requires vendor-sourced SIR + BI + raycon_scenario.json. Greg's call (Rec. 8). Manual MCP path is unaffected.
  VENDOR_GATE_ENABLED: "1"

jobs:
  raycon-followup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore DD republish dedup state
        # Persists .dd_republish_state.json across cron ticks so source
        # fingerprints republish once. Without this the state file is
        # born empty every run and dedup degrades to intra-run only.
        #
        # Save key includes ${{ github.run_id }} so each run writes a
        # fresh cache entry (actions/cache only writes when the exact
        # key is new); restore-keys falls back to the latest entry that
        # matches the prefix, giving us cross-run continuity without
        # ever overwriting a key in place.
        id: restore-dd-republish-state
        uses: actions/cache/restore@v4
        with:
          path: .dd_republish_state.json
          key: dd-republish-state-${{ github.run_id }}
          restore-keys: |
            dd-republish-state-

      - name: Restore RayCon runtime state
        # Persists dispatch and alert dedup state across cron ticks.
        # Without this, failed-scenario retries and owner/Chat alert suppression
        # reset on every clean Actions checkout.
        id: restore-raycon-runtime-state
        uses: actions/cache/restore@v4
        with:
          path: |
            .raycon_dispatch_state.json
            .raycon_followup_alerts.json
          key: raycon-runtime-state-${{ github.run_id }}
          restore-keys: |
            raycon-runtime-state-

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.OAUTH_CLIENT_ID }}" ]            || { echo "OAUTH_CLIENT_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]        || { echo "OAUTH_CLIENT_SECRET missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_REFRESH_TOKEN }}" ]        || { echo "OAUTH_REFRESH_TOKEN missing"; exit 1; }
          [ -n "${{ secrets.RHODES_API_KEY }}" ]             || { echo "RHODES_API_KEY missing"; exit 1; }
          echo "All required secrets are present"

      - name: Create .env file from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          DD_TEMPLATE_V3_GOOGLE_DOC_ID: ${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}
          SIR_FOLDER_ID: ${{ secrets.SIR_FOLDER_ID }}
          ISP_FOLDER_ID: ${{ secrets.ISP_FOLDER_ID }}
          BUILDING_INSPECTION_FOLDER_ID: ${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}
          RHODES_API_KEY: ${{ secrets.RHODES_API_KEY }}
          RHODES_MCP_URL: ${{ secrets.RHODES_MCP_URL }}
          DD_REPUBLISH_STATE_STORE: ${{ vars.DD_REPUBLISH_STATE_STORE }}
          DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID: ${{ vars.DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID }}
          DD_REPUBLISH_STATE_FIRESTORE_DATABASE: ${{ vars.DD_REPUBLISH_STATE_FIRESTORE_DATABASE }}
          DD_REPUBLISH_STATE_FIRESTORE_COLLECTION: ${{ vars.DD_REPUBLISH_STATE_FIRESTORE_COLLECTION }}
          RAYCON_RUNTIME_STATE_STORE: ${{ vars.RAYCON_RUNTIME_STATE_STORE }}
          RAYCON_RUNTIME_STATE_FIRESTORE_PROJECT_ID: ${{ vars.RAYCON_RUNTIME_STATE_FIRESTORE_PROJECT_ID }}
          RAYCON_RUNTIME_STATE_FIRESTORE_DATABASE: ${{ vars.RAYCON_RUNTIME_STATE_FIRESTORE_DATABASE }}
          RAYCON_RUNTIME_STATE_DISPATCH_FIRESTORE_COLLECTION: ${{ vars.RAYCON_RUNTIME_STATE_DISPATCH_FIRESTORE_COLLECTION }}
          RAYCON_RUNTIME_STATE_ALERT_FIRESTORE_COLLECTION: ${{ vars.RAYCON_RUNTIME_STATE_ALERT_FIRESTORE_COLLECTION }}
          RAYCON_FOLLOWUP_EXTRA_MENTION_USER_IDS: ${{ vars.RAYCON_FOLLOWUP_EXTRA_MENTION_USER_IDS }}
        run: |
          touch .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> .env
          echo "GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}" >> .env
          echo "GOOGLE_CHAT_WEBHOOK_URL=${GOOGLE_CHAT_WEBHOOK_URL}" >> .env
          echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID=${DD_TEMPLATE_V3_GOOGLE_DOC_ID}" >> .env
          echo "SIR_FOLDER_ID=${SIR_FOLDER_ID}" >> .env
          echo "ISP_FOLDER_ID=${ISP_FOLDER_ID}" >> .env
          echo "BUILDING_INSPECTION_FOLDER_ID=${BUILDING_INSPECTION_FOLDER_ID}" >> .env
          echo "RHODES_API_KEY=${RHODES_API_KEY}" >> .env
          echo "RHODES_MCP_URL=${RHODES_MCP_URL}" >> .env
          echo "DD_REPUBLISH_STATE_STORE=${DD_REPUBLISH_STATE_STORE}" >> .env
          echo "DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID=${DD_REPUBLISH_STATE_FIRESTORE_PROJECT_ID}" >> .env
          echo "DD_REPUBLISH_STATE_FIRESTORE_DATABASE=${DD_REPUBLISH_STATE_FIRESTORE_DATABASE}" >> .env
          echo "DD_REPUBLISH_STATE_FIRESTORE_COLLECTION=${DD_REPUBLISH_STATE_FIRESTORE_COLLECTION}" >> .env
          echo "RAYCON_RUNTIME_STATE_STORE=${RAYCON_RUNTIME_STATE_STORE}" >> .env
          echo "RAYCON_RUNTIME_STATE_FIRESTORE_PROJECT_ID=${RAYCON_RUNTIME_STATE_FIRESTORE_PROJECT_ID}" >> .env
          echo "RAYCON_RUNTIME_STATE_FIRESTORE_DATABASE=${RAYCON_RUNTIME_STATE_FIRESTORE_DATABASE}" >> .env
          echo "RAYCON_RUNTIME_STATE_DISPATCH_FIRESTORE_COLLECTION=${RAYCON_RUNTIME_STATE_DISPATCH_FIRESTORE_COLLECTION}" >> .env
          echo "RAYCON_RUNTIME_STATE_ALERT_FIRESTORE_COLLECTION=${RAYCON_RUNTIME_STATE_ALERT_FIRESTORE_COLLECTION}" >> .env
          echo "RAYCON_FOLLOWUP_EXTRA_MENTION_USER_IDS=${RAYCON_FOLLOWUP_EXTRA_MENTION_USER_IDS}" >> .env
          echo "Created .env file"

      - name: Write Google OAuth client secrets
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          mkdir -p credentials
          python -c "
          import json, os
          data = {
              'installed': {
                  'client_id': os.environ['OAUTH_CLIENT_ID'],
                  'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
                  'redirect_uris': ['http://localhost'],
                  'auth_uri': 'https://accounts.google.com/o/oauth2/auth',
                  'token_uri': 'https://oauth2.googleapis.com/token',
              }
          }
          with open('credentials/client_secrets.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Write Google OAuth refresh token
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          python -c "
          import json, os
          data = {
              'token': None,
              'refresh_token': os.environ['OAUTH_REFRESH_TOKEN'],
              'token_uri': 'https://oauth2.googleapis.com/token',
              'client_id': os.environ['OAUTH_CLIENT_ID'],
              'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
              'scopes': [
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/documents',
                  'https://www.googleapis.com/auth/gmail.modify',
              ],
          }
          with open('.gcp-saved-tokens.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Write Firestore service account credentials
        env:
          GCP_FIRESTORE_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_FIRESTORE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GCP_FIRESTORE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "No Firestore service account configured; Firestore-backed state will use JSON/cache fallback"
            exit 0
          fi
          mkdir -p credentials
          printf '%s' "${GCP_FIRESTORE_SERVICE_ACCOUNT_JSON}" > credentials/firestore-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${GITHUB_WORKSPACE}/credentials/firestore-service-account.json" >> "$GITHUB_ENV"
          echo "Firestore service account credentials configured"

      - name: Run RayCon follow-up
        env:
          # Pass workflow inputs through env vars so they reach the script
          # as a single argv element each, never re-parsed by the shell.
          INPUT_SITE: ${{ inputs.site }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_ALERT_AFTER_MINUTES: ${{ inputs.alert_after_minutes }}
          # RayCon callback inputs (Rec. 2). site_id scopes the run to a
          # single site; run_id and status are observability-only and
          # logged so on-call can correlate with RayCon-side logs.
          INPUT_SITE_ID: ${{ inputs.site_id }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          INPUT_STATUS: ${{ inputs.status }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_SITE_ID:-}" ] || [ -n "${INPUT_RUN_ID:-}" ] || [ -n "${INPUT_STATUS:-}" ]; then
            echo "RayCon callback dispatch: site_id='${INPUT_SITE_ID:-}' run_id='${INPUT_RUN_ID:-}' status='${INPUT_STATUS:-}'"
          fi
          ARGS=()
          if [ -n "${INPUT_SITE:-}" ]; then
            ARGS+=(--site "$INPUT_SITE")
          fi
          if [ "${INPUT_DRY_RUN:-}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${INPUT_ALERT_AFTER_MINUTES:-}" ]; then
            ARGS+=(--alert-after-minutes "$INPUT_ALERT_AFTER_MINUTES")
          fi
          if [ -n "${INPUT_SITE_ID:-}" ]; then
            ARGS+=(--site-id "$INPUT_SITE_ID")
          fi
          if [ -n "${INPUT_RUN_ID:-}" ]; then
            ARGS+=(--run-id "$INPUT_RUN_ID")
          fi
          if [ -n "${INPUT_STATUS:-}" ]; then
            ARGS+=(--status "$INPUT_STATUS")
          fi
          uv run python scripts/raycon_followup.py "${ARGS[@]}"

      - name: Save DD republish dedup state
        # Always run so we persist state even when the script step
        # exits non-zero — partial dedup beats no dedup. The save key
        # is run-id-scoped so we never collide with an existing entry;
        # the next run picks us up via the restore-keys prefix fallback.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .dd_republish_state.json
          key: dd-republish-state-${{ github.run_id }}

      - name: Save RayCon runtime state
        # Always run so recovery dispatches and owner/Chat alert suppression survive
        # the next scheduled checkout.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .raycon_dispatch_state.json
            .raycon_followup_alerts.json
          key: raycon-runtime-state-${{ github.run_id }}

      - name: Done
        run: echo "RayCon follow-up completed"
