name: RayCon Follow-up

# Picks up `raycon_scenario.json` files RayCon writes back into per-site
# M1 folders (after DDR pings them via /v1/jobs) and publishes the
# RayCon Scenario Google Doc. Runs every 5 minutes during business
# hours so a Block Plan -> published scenario takes <10 min end-to-end.
#
# Re-running is safe: only re-publishes when the JSON is newer than
# the existing report Doc.

on:
  schedule:
    # Every 5 minutes, 6AM-6PM Central, Mon-Fri.
    - cron: '*/5 11-23 * * 1-5'
    # Every 5 minutes, 6PM-8PM Central (covers UTC rollover).
    - cron: '*/5 0-2 * * 2-6'
  workflow_dispatch:
    inputs:
      site:
        description: 'Optional site filter (substring match against title or address)'
        required: false
        type: string
      dry_run:
        description: 'Detect only; do not publish docs'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      alert_after_minutes:
        description: 'Alert when a Block Plan has no scenario after this many minutes'
        required: false
        default: '60'
        type: string

concurrency:
  group: raycon-followup
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Vendor gate ON: requires vendor-sourced SIR + BI + raycon_scenario.json. Greg's call (Rec. 8). Manual MCP path is unaffected.
  VENDOR_GATE_ENABLED: "1"

jobs:
  raycon-followup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore DD republish dedup state
        # Persists .dd_republish_state.json across cron ticks so the 12h
        # DD_REPUBLISH_FORCE_AFTER window is honored. Without this the
        # state file is born empty every run and dedup degrades to
        # intra-run only.
        #
        # Save key includes ${{ github.run_id }} so each run writes a
        # fresh cache entry (actions/cache only writes when the exact
        # key is new); restore-keys falls back to the latest entry that
        # matches the prefix, giving us cross-run continuity without
        # ever overwriting a key in place.
        id: restore-dd-republish-state
        uses: actions/cache/restore@v4
        with:
          path: .dd_republish_state.json
          key: dd-republish-state-${{ github.workflow }}-${{ github.run_id }}
          restore-keys: |
            dd-republish-state-${{ github.workflow }}-
            dd-republish-state-

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.OAUTH_CLIENT_ID }}" ]            || { echo "OAUTH_CLIENT_ID missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_CLIENT_SECRET }}" ]        || { echo "OAUTH_CLIENT_SECRET missing"; exit 1; }
          [ -n "${{ secrets.OAUTH_REFRESH_TOKEN }}" ]        || { echo "OAUTH_REFRESH_TOKEN missing"; exit 1; }
          [ -n "${{ secrets.WRIKE_ACCESS_TOKEN }}" ]         || { echo "WRIKE_ACCESS_TOKEN missing"; exit 1; }
          echo "All required secrets are present"

      - name: Create .env file from secrets
        env:
          WRIKE_ACCESS_TOKEN: ${{ secrets.WRIKE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          DD_TEMPLATE_V3_GOOGLE_DOC_ID: ${{ secrets.DD_TEMPLATE_V3_GOOGLE_DOC_ID }}
          SIR_FOLDER_ID: ${{ secrets.SIR_FOLDER_ID }}
          ISP_FOLDER_ID: ${{ secrets.ISP_FOLDER_ID }}
          BUILDING_INSPECTION_FOLDER_ID: ${{ secrets.BUILDING_INSPECTION_FOLDER_ID }}
        run: |
          touch .env
          echo "WRIKE_ACCESS_TOKEN=${WRIKE_ACCESS_TOKEN}" >> .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "GOOGLE_DRIVE_ROOT_FOLDER_ID=${GOOGLE_DRIVE_ROOT_FOLDER_ID}" >> .env
          echo "GOOGLE_CHAT_WEBHOOK_URL=${GOOGLE_CHAT_WEBHOOK_URL}" >> .env
          echo "DD_TEMPLATE_V3_GOOGLE_DOC_ID=${DD_TEMPLATE_V3_GOOGLE_DOC_ID}" >> .env
          echo "SIR_FOLDER_ID=${SIR_FOLDER_ID}" >> .env
          echo "ISP_FOLDER_ID=${ISP_FOLDER_ID}" >> .env
          echo "BUILDING_INSPECTION_FOLDER_ID=${BUILDING_INSPECTION_FOLDER_ID}" >> .env
          echo "Created .env file"

      - name: Write Google OAuth client secrets
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          mkdir -p credentials
          python -c "
          import json, os
          data = {
              'installed': {
                  'client_id': os.environ['OAUTH_CLIENT_ID'],
                  'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
                  'redirect_uris': ['http://localhost'],
                  'auth_uri': 'https://accounts.google.com/o/oauth2/auth',
                  'token_uri': 'https://oauth2.googleapis.com/token',
              }
          }
          with open('credentials/client_secrets.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Write Google OAuth refresh token
        env:
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          python -c "
          import json, os
          data = {
              'token': None,
              'refresh_token': os.environ['OAUTH_REFRESH_TOKEN'],
              'token_uri': 'https://oauth2.googleapis.com/token',
              'client_id': os.environ['OAUTH_CLIENT_ID'],
              'client_secret': os.environ['OAUTH_CLIENT_SECRET'],
              'scopes': [
                  'https://www.googleapis.com/auth/drive',
                  'https://www.googleapis.com/auth/documents',
                  'https://www.googleapis.com/auth/gmail.modify',
              ],
          }
          with open('.gcp-saved-tokens.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Run RayCon follow-up
        env:
          # Pass workflow inputs through env vars so they reach the script
          # as a single argv element each, never re-parsed by the shell.
          INPUT_SITE: ${{ inputs.site }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_ALERT_AFTER_MINUTES: ${{ inputs.alert_after_minutes }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${INPUT_SITE:-}" ]; then
            ARGS+=(--site "$INPUT_SITE")
          fi
          if [ "${INPUT_DRY_RUN:-}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "${INPUT_ALERT_AFTER_MINUTES:-}" ]; then
            ARGS+=(--alert-after-minutes "$INPUT_ALERT_AFTER_MINUTES")
          fi
          uv run python scripts/raycon_followup.py "${ARGS[@]}"

      - name: Save DD republish dedup state
        # Always run so we persist state even when the script step
        # exits non-zero — partial dedup beats no dedup. The save key
        # is run-id-scoped so we never collide with an existing entry;
        # the next run picks us up via the restore-keys prefix fallback.
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .dd_republish_state.json
          key: dd-republish-state-${{ github.workflow }}-${{ github.run_id }}

      - name: Done
        run: echo "RayCon follow-up completed"
