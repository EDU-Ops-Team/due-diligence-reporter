name: cleanup-phantom-recovery-slugs

# One-shot cleanup for the 2026-05-01 recover_migration_wiped_sites.py run.
# DELETEs the 11 wiped canonical-slug stubs and renames the 11 phantom
# legacy-slug records onto their canonical slugs. After this runs, the
# 11 sites that landed under wrong slugs are restored under canonical
# slugs with their hydrated analytical fields intact.
#
# Manual dispatch only. Run with apply=false first to see the plan.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually issue DELETE + rename calls (false = dry-run)"
        type: choice
        required: true
        default: "false"
        options:
          - "false"
          - "true"
      pair:
        description: "Optional substring filter on phantom slug (e.g. 'bethesda'). Leave blank for all 11."
        type: string
        required: false
        default: ""

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.DASHBOARD_PUBLISH_SECRET }}" ] || {
            echo "[ERROR] DASHBOARD_PUBLISH_SECRET missing"; exit 1;
          }

      - name: Run cleanup
        env:
          DASHBOARD_PUBLISH_SECRET: ${{ secrets.DASHBOARD_PUBLISH_SECRET }}
          APPLY: ${{ inputs.apply }}
          PAIR: ${{ inputs.pair }}
        run: |
          set -euo pipefail
          # Build args as a bash array so each token stays a single shell
          # word even if PAIR contains spaces or shell metacharacters.
          # Unquoted ${PAIR_ARG} would word-split: PAIR='alpha school'
          # would have argparse see '--pair alpha school' as three args.
          ARGS=()
          if [ "${APPLY}" = "true" ]; then
            ARGS+=("--apply")
          else
            ARGS+=("--dry-run")
          fi
          if [ -n "${PAIR}" ]; then
            ARGS+=("--pair" "${PAIR}")
          fi
          uv run python scripts/cleanup_phantom_recovery_slugs.py "${ARGS[@]}"

      - name: Done
        env:
          APPLY: ${{ inputs.apply }}
        run: echo "Cleanup run completed (apply=${APPLY})"
