name: Diagnose Chat Webhook

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe webhook
        env:
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          echo "== Secret length =="
          echo -n "${GOOGLE_CHAT_WEBHOOK_URL}" | wc -c
          echo "== URL host (first part of URL) =="
          echo "${GOOGLE_CHAT_WEBHOOK_URL%%/*}//${GOOGLE_CHAT_WEBHOOK_URL#*//}" | head -c 50
          echo ""
          echo "== Has /v1/spaces/ =="
          if echo "${GOOGLE_CHAT_WEBHOOK_URL}" | grep -q "/v1/spaces/"; then
            echo "yes"
          else
            echo "no"
          fi
          echo ""
          echo "== POST minimal payload =="
          http_code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -d '{"text":"DD pipeline webhook diagnostic ping — please ignore"}' \
            "${GOOGLE_CHAT_WEBHOOK_URL}")
          echo "HTTP $http_code"
          echo "--- body ---"
          cat /tmp/resp.txt
          echo ""
