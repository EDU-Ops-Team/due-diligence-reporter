name: Portfolio Automation Gaps

on:
  schedule:
    - cron: '15 11 * * 1-5'
  workflow_dispatch:
    inputs:
      max_sites:
        description: 'Maximum active Rhodes sites to scan'
        required: false
        default: '100'
        type: string
      include_clean:
        description: 'Include sites with no detected gaps'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      trigger_remediation:
        description: 'Run AADP-owned remediation for correctable gaps'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: portfolio-automation-gaps
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  portfolio-automation-gaps:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"

      - name: Install dependencies
        run: uv sync

      - name: Verify required secrets
        run: |
          [ -n "${{ secrets.RHODES_API_KEY }}" ] || { echo "RHODES_API_KEY missing"; exit 1; }

      - name: Create .env file from secrets
        env:
          RHODES_API_KEY: ${{ secrets.RHODES_API_KEY }}
          RHODES_MCP_URL: ${{ secrets.RHODES_MCP_URL }}
        run: |
          touch .env
          echo "RHODES_API_KEY=${RHODES_API_KEY}" >> .env
          echo "RHODES_MCP_URL=${RHODES_MCP_URL}" >> .env

      - name: Build portfolio gap snapshot
        env:
          RHODES_API_KEY: ${{ secrets.RHODES_API_KEY }}
          RHODES_MCP_URL: ${{ secrets.RHODES_MCP_URL }}
          INPUT_MAX_SITES: ${{ inputs.max_sites }}
          INPUT_INCLUDE_CLEAN: ${{ inputs.include_clean }}
        run: |
          set -euo pipefail
          started_at="$(python -c 'from datetime import UTC, datetime; print(datetime.now(UTC).isoformat())')"
          echo "PORTFOLIO_GAPS_STARTED_AT=${started_at}" >> "$GITHUB_ENV"
          max_sites="${INPUT_MAX_SITES:-100}"
          include_clean="${INPUT_INCLUDE_CLEAN:-false}"
          args=(--max-sites "$max_sites")
          if [ "$include_clean" = "true" ]; then
            args+=(--include-clean)
          else
            args+=(--no-include-clean)
          fi

          uv run ddr portfolio-gaps "${args[@]}" | tee portfolio-automation-gaps.txt
          uv run ddr portfolio-gaps "${args[@]}" --json > portfolio-automation-gaps.json

          {
            echo "## Portfolio Automation Gaps"
            echo
            echo '```text'
            cat portfolio-automation-gaps.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout AADP remediation runner
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.trigger_remediation != 'false' }}
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: trilogy-group/alpha-analysis-downstream-processing
          ref: main
          path: aadp-remediation
          token: ${{ secrets.AADP_REMEDIATION_REPO_TOKEN || github.token }}

      - name: Trigger AADP remediation for correctable gaps
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.trigger_remediation != 'false' }}
        env:
          AADP_DRIVE_PARENT_FOLDER_ID: ${{ vars.AADP_DRIVE_PARENT_FOLDER_ID || secrets.AADP_DRIVE_PARENT_FOLDER_ID }}
          GCP_FIRESTORE_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_FIRESTORE_SERVICE_ACCOUNT_JSON }}
          PIPELINE_STATUS_FIRESTORE_COLLECTION: alphaAnalysisPipelineStatus
          PIPELINE_STATUS_FIRESTORE_DATABASE: edu-ops-email-router
          PIPELINE_STATUS_FIRESTORE_PROJECT_ID: ap-automation-464623
          PIPELINE_STATUS_STORE: firestore
          RHODES_API_KEY: ${{ secrets.RHODES_API_KEY }}
        run: |
          if [ -z "${GCP_FIRESTORE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::warning title=AADP telemetry not persisted::GCP_FIRESTORE_SERVICE_ACCOUNT_JSON is not configured for this workflow, so AADP remediation source runs will not reach the dashboard Firestore store."
          fi

          uv run python scripts/run_aadp_portfolio_gap_remediation.py \
            --snapshot portfolio-automation-gaps.json \
            --aadp-repo aadp-remediation \
            --drive-parent-folder-id "${AADP_DRIVE_PARENT_FOLDER_ID:-}"

      - name: Post Google Chat summary when gaps exist
        env:
          DDR_GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.DDR_GOOGLE_CHAT_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          uv run python scripts/post_portfolio_gap_summary.py \
            --snapshot portfolio-automation-gaps.json \
            --webhook-url "${DDR_GOOGLE_CHAT_WEBHOOK_URL:-}" \
            --run-url "${GITHUB_RUN_URL}" \
            --max-sites 5 \
            --result-output portfolio-automation-gaps-notification.json

      - name: Build dashboard telemetry artifact
        if: ${{ always() }}
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p reports/telemetry
          finished_at="$(python -c 'from datetime import UTC, datetime; print(datetime.now(UTC).isoformat())')"
          python scripts/build_portfolio_gap_telemetry.py \
            --snapshot portfolio-automation-gaps.json \
            --notification-result portfolio-automation-gaps-notification.json \
            --output reports/telemetry/portfolio-automation-gaps-telemetry.json \
            --run-id "portfolio-gaps-${{ github.run_id }}" \
            --trigger "${{ github.event_name }}" \
            --started-at "${PORTFOLIO_GAPS_STARTED_AT:-$finished_at}" \
            --finished-at "$finished_at" \
            --workflow-run-url "${GITHUB_RUN_URL}" \
            --source-status "${JOB_STATUS}"

      - name: Upload snapshot artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-automation-gaps
          if-no-files-found: warn
          path: |
            portfolio-automation-gaps.txt
            portfolio-automation-gaps.json
            portfolio-automation-gaps-notification.json
            reports/telemetry/portfolio-automation-gaps-telemetry.json
